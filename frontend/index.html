<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kundali Compatibility Engine</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero hidden">
      </section>

      <section class="grid-two">
        <article class="card person-card" data-person="boy">
          <div class="card-header">
            <h2>Boy Details</h2>
            <span class="pill">Profile A</span>
          </div>
          <label class="profile-select-field">
            <span>Load Profile</span>
            <select id="boy-profile-select">
              <option value="">-- Select a saved profile --</option>
            </select>
          </label>
          <label>
            <span>Name</span>
            <input type="text" id="boy-name" placeholder="Optional name" />
          </label>
          <label>
            <span>Date of Birth</span>
            <input type="date" id="boy-dob" required />
          </label>
          <label>
            <span>Time of Birth</span>
            <input type="time" id="boy-time" required />
          </label>
          <label class="place-field">
            <span>Place of Birth</span>
            <input type="text" id="boy-place" autocomplete="off" placeholder="Start typing a city" required />
            <div class="suggestions hidden" id="boy-suggestions"></div>
          </label>
        </article>

        <article class="card person-card" data-person="girl">
          <div class="card-header">
            <h2>Girl Details</h2>
            <span class="pill">Profile B</span>
          </div>
          <label class="profile-select-field">
            <span>Load Profile</span>
            <select id="girl-profile-select">
              <option value="">-- Select a saved profile --</option>
            </select>
          </label>
          <label>
            <span>Name</span>
            <input type="text" id="girl-name" placeholder="Optional name" />
          </label>
          <label>
            <span>Date of Birth</span>
            <input type="date" id="girl-dob" required />
          </label>
          <label>
            <span>Time of Birth</span>
            <input type="time" id="girl-time" required />
          </label>
          <label class="place-field">
            <span>Place of Birth</span>
            <input type="text" id="girl-place" autocomplete="off" placeholder="Start typing a city" required />
            <div class="suggestions hidden" id="girl-suggestions"></div>
          </label>
        </article>
      </section>

      <section class="card actions-card">
        <div class="button-row">
          <button id="calculate-btn" class="primary">Calculate Compatibility (/36)</button>
          <button id="full-data-btn" class="secondary">Generate Full Data (Advanced)</button>
          <button id="copy-btn" class="ghost" disabled>Copy Full Data</button>
        </div>
        <p id="status-message" class="status-message"></p>
      </section>

      <section id="compatibility-panel" class="card hidden">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Compatibility Score</p>
            <h2 id="score-heading">0 / 36</h2>
          </div>
          <span id="verdict-pill" class="verdict-pill">Pending</span>
        </div>
        <div class="progress-track">
          <div id="score-progress" class="progress-bar"></div>
        </div>
        <div id="meta-summary-grid" class="meta-summary-grid hidden">
          <div class="meta-column" data-person="boy">
            <strong>Boy:</strong> <span id="boy-meta-text"></span>
          </div>
          <div class="meta-column" data-person="girl">
            <strong>Girl:</strong> <span id="girl-meta-text"></span>
          </div>
        </div>
        <div id="compatibility-warnings" class="warning-stack"></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Guna</th>
                <th>Boy</th>
                <th>Girl</th>
                <th>Max</th>
                <th>Obtained</th>
                <th>Area of Life</th>
              </tr>
            </thead>
            <tbody id="breakdown-body"></tbody>
          </table>
        </div>
      </section>

      <section id="full-data-panel" class="card hidden">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Structured Chart Data</p>
            <h2>Complete Output</h2>
          </div>
          <span class="pill">Strictly validated</span>
        </div>
        <div id="full-data-content" class="result-grid"></div>
        <div class="json-preview">
          <div class="panel-header compact">
            <h3>Raw JSON</h3>
          </div>
          <pre id="json-output"></pre>
        </div>
      </section>
    </main>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
